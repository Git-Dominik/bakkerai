<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/admin_css/admin.css">
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="nav-logo" aria-label="Home">

                </svg>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/chat" class="nav-link">Chat</a>
            </div>
            <div class="nav-right">
                <a href="/login" id="loginLink">Inloggen</a>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <h1 class="page-title">Admin Dashboard</h1>
        <button id="backBtn" class="back-btn" hidden onclick="goBack()">Back</button>
    </div>

    <main id="content">
        <div id="loading" class="loading" hidden>Loading...</div>
        <div id="error" class="error" hidden></div>

        <div id="usersView" hidden>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Chats</th>
                        <th>Messages</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>

        <div id="userDetailView" hidden>
            <div class="user-header">
                <h2 id="userDetailName"></h2>
                <p id="userDetailEmail"></p>
                <p class="stat">Total messages: <span id="userDetailMessages"></span></p>
            </div>
            <h3>Chats</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Topic</th>
                        <th>Messages</th>
                    </tr>
                </thead>
                <tbody id="chatsTableBody"></tbody>
            </table>
        </div>

        <div id="chatDetailView" hidden>
            <div class="chat-header">
                <h2 id="chatDetailTopic"></h2>
                <p id="chatDetailUser"></p>
            </div>
            <div id="messagesContainer" class="messages-container"></div>
        </div>
    </main>

    <script>
        const views = ["usersView", "userDetailView", "chatDetailView"];
        let viewStack = ["usersView"];

        function showView(viewId) {
            views.forEach(v => {
                document.getElementById(v).hidden = v !== viewId;
            });
            document.getElementById("backBtn").hidden = viewStack.length <= 1;
        }

        function goBack() {
            viewStack.pop();
            showView(viewStack[viewStack.length - 1]);
            if (viewStack[viewStack.length - 1] === "usersView") {
                loadUsers();
            }
        }

        function setLoading(loading) {
            document.getElementById("loading").hidden = !loading;
        }

        function showError(msg) {
            const errorEl = document.getElementById("error");
            if (msg) {
                errorEl.textContent = msg;
                errorEl.hidden = false;
            } else {
                errorEl.hidden = true;
            }
        }

        async function fetchAdmin(path) {
            const res = await fetch(path);
            if (res.status === 401 || res.status === 403) {
                const body = await res.text();
                showError(`Unauthorized - ${body}`);
                return null;
            }
            if (!res.ok) {
                const body = await res.text();
                showError(`Error ${res.status}: ${body}`);
                return null;
            }
            return res.json();
        }

        async function loadUsers() {
            setLoading(true);
            showError(null);
            showView("usersView");

            const users = await fetchAdmin("/api/admin/users");
            setLoading(false);
            if (!users) return;

            const tbody = document.getElementById("usersTableBody");
            tbody.innerHTML = "";

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">No users found</td></tr>';
                return;
            }

            users.forEach(user => {
                const tr = document.createElement("tr");
                tr.className = "clickable-row";
                tr.onclick = () => loadUserDetail(user.id);
                tr.innerHTML = `
                    <td>${user.id}</td>
                    <td>${escapeHtml(user.name)}</td>
                    <td>${escapeHtml(user.email)}</td>
                    <td>${user.chatCount}</td>
                    <td>${user.messageCount}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function loadUserDetail(userId) {
            setLoading(true);
            showError(null);

            const user = await fetchAdmin(`/api/admin/users/${userId}`);
            setLoading(false);
            if (!user) return;

            viewStack.push("userDetailView");
            showView("userDetailView");

            document.getElementById("userDetailName").textContent = user.name;
            document.getElementById("userDetailEmail").textContent = user.email;
            document.getElementById("userDetailMessages").textContent = user.messageCount;

            const tbody = document.getElementById("chatsTableBody");
            tbody.innerHTML = "";

            if (user.chats.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">No chats found</td></tr>';
                return;
            }

            user.chats.forEach(chat => {
                const tr = document.createElement("tr");
                tr.className = "clickable-row";
                tr.onclick = () => loadChatDetail(chat.id);
                tr.innerHTML = `
                    <td>${chat.id}</td>
                    <td>${escapeHtml(chat.topic)}</td>
                    <td>${chat.messageCount}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function loadChatDetail(chatId) {
            setLoading(true);
            showError(null);

            const chat = await fetchAdmin(`/api/admin/chats/${chatId}/messages`);
            setLoading(false);
            if (!chat) return;

            viewStack.push("chatDetailView");
            showView("chatDetailView");

            document.getElementById("chatDetailTopic").textContent = chat.topic;
            document.getElementById("chatDetailUser").textContent =
                `User: ${escapeHtml(chat.user.name)} (${escapeHtml(chat.user.email)})`;

            const container = document.getElementById("messagesContainer");
            container.innerHTML = "";

            if (chat.messages.length === 0) {
                container.innerHTML = '<p class="no-messages">No messages in this chat</p>';
                return;
            }

            chat.messages.forEach(msg => {
                const div = document.createElement("div");
                div.className = `message ${msg.role}`;
                div.innerHTML = `
                    <div class="message-header">
                        <span class="role-badge">${msg.role}</span>
                        <span class="timestamp">${formatTimestamp(msg.timestamp)}</span>
                    </div>
                    <div class="message-content">${formatMessageContent(msg.content)}</div>
                `;
                container.appendChild(div);
            });
        }

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        function formatTimestamp(ts) {
            return new Date(ts).toLocaleString();
        }

        function formatMessageContent(content) {
            const escaped = escapeHtml(content);
            return escaped
                .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
                .replace(/\*(.*?)\*/g, "<em>$1</em>")
                .replace(/\n/g, "<br>");
        }

        document.addEventListener("DOMContentLoaded", loadUsers);
    </script>
</body>
</html>
